<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎯Từ Vựng Tiếng Anh 6 - Global Success</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4A90E2;
            --secondary: #2ECC71;
            --danger: #E74C3C;
            --dark: #2C3E50;
            --light: #F8F9FA;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Quicksand', sans-serif;
        }

        body {
            background-color: #eef2f7;
            color: var(--dark);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            margin-bottom: 25px;
        }

        header h1 {
            color: var(--primary);
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        .score-board {
            background: white;
            padding: 10px 20px;
            border-radius: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            font-weight: bold;
            display: flex;
            gap: 20px;
        }

        .score-board span {
            color: var(--primary);
        }

        .unit-container {
            max-width: 600px;
            width: 100%;
            background: white;
            padding: 15px 20px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            margin-bottom: 25px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .unit-label {
            font-size: 1rem;
            font-weight: 700;
            color: var(--dark);
        }

        .unit-select {
            width: 100%;
            padding: 12px;
            font-size: 1rem;
            font-weight: bold;
            font-family: 'Quicksand', sans-serif;
            color: var(--dark);
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            background-color: var(--light);
            outline: none;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        .unit-select:focus {
            border-color: var(--primary);
        }

        .game-zone {
            max-width: 600px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Mode Tabs chỉnh lại để chứa đủ 3 nút */
        .mode-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            width: 100%;
        }

        .mode-btn {
            flex: 1;
            padding: 12px 8px;
            border: none;
            background: #d1d5db;
            font-weight: bold;
            font-size: 0.9rem;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }

        .mode-btn.active {
            background: var(--dark);
            color: white;
        }

        /* Flashcard Component */
        .flashcard-wrapper {
            width: 100%;
            perspective: 1000px;
            height: 280px;
            margin-bottom: 20px;
            cursor: pointer;
        }

        .flashcard {
            width: 80%;
            height: 80%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .flashcard.flipped {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 80%;
            height: 80%;
            backface-visibility: hidden;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }

        .card-front {
            background: white;
            border: 3px solid var(--primary);
        }

        .card-back {
            background: var(--primary);
            color: white;
            transform: rotateY(180deg);
        }

        .card-word {
            font-size: 2.2rem;
            color: var(--dark);
            margin-bottom: 10px;
        }

        .card-ipa {
            font-size: 1.2rem;
            color: #7f8c8d;
            background: #f1f2f6;
            padding: 4px 15px;
            border-radius: 20px;
        }

        .card-meaning {
            font-size: 1.8rem;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .card-example {
            font-style: italic;
            font-size: 1rem;
            opacity: 0.9;
        }

        /* Common Containers cho các phần Tự luận tự gõ */
        .practice-container {
            background: white;
            width: 80%;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            display: none;
            text-align: center;
        }

        .practice-question {
            margin-bottom: 20px;
        }

        .question-label {
            font-size: 0.9rem;
            color: #7f8c8d;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .question-text {
            font-size: 2.2rem;
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 5px;
        }

        .question-hint {
            font-size: 1.1rem;
            color: #555;
            font-style: italic;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }

        .answer-input {
            width: 80%;
            padding: 15px;
            font-size: 1.2rem;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            outline: none;
            text-align: center;
            font-family: 'Quicksand', sans-serif;
            font-weight: bold;
            transition: border-color 0.2s;
        }

        .answer-input:focus {
            border-color: var(--primary);
        }

        .submit-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .submit-btn:hover {
            background: #357ABD;
        }

        .result-display {
            margin-top: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            min-height: 30px;
            text-align: left;
            padding: 0 10px;
        }

        /* Khung hiển thị ví dụ dạng chuyên nghiệp */
        .example-box {
            margin-top: 15px;
            background: #f8fafc;
            border-left: 4px solid var(--primary);
            padding: 12px;
            border-radius: 0 8px 8px 0;
            font-size: 0.95rem;
            font-weight: normal;
            color: #334155;
        }

        .example-box p {
            margin-bottom: 6px;
        }
        .example-box p:last-child {
            margin-bottom: 0;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-top: 15px;
        }

        .control-btn {
            background: white;
            border: 2px solid var(--dark);
            color: var(--dark);
            padding: 10px 25px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .control-btn:hover {
            background: var(--dark);
            color: white;
        }

        .footer-note {
            margin-top: 30px;
            font-size: 0.85rem;
            color: #7f8c8d;
        }
    </style>
</head>

            </div>
            <div class="controls">

        </div>

                <button class="submit-btn" onclick="checkAnswer('practice')">Kiểm tra (Enter)</button>
            </div>
            <div id="resultDisplay" class="result-display"></div>
        </div>

        <!-- 3. ĐOÁN NGHĨA TIẾNG VIỆT SECTION (MỚI THÊM) -->

            </div>

                <button class="submit-btn" onclick="checkAnswer('meaning')">Kiểm tra (Enter)</button>
            </div>
            <div id="meaningResultDisplay" class="result-display"></div>
        </div>

    </div>

        window.onload = function() {
            handleUnitChange("1"); 
            
            // Lắng nghe sự kiện phím Enter cho cả hai ô nhập liệu
            document.getElementById('answerInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') checkAnswer('practice');
            });

            document.getElementById('meaningInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') checkAnswer('meaning');
            });
        };

        function handleUnitChange(targetValue) {
            currentIndex = 0;
            const card = document.getElementById('card');
            card.classList.remove('flipped');

            if (targetValue === "all") {
                activeWordsList = [];
                Object.keys(vocabularyData).forEach(unit => {
                    activeWordsList.push(...vocabularyData[unit]);
                });
                activeWordsList.sort(() => Math.random() - 0.5);
            } else {
                activeWordsList = [...vocabularyData[targetValue]];
            }

            updateFlashcard();
            if (currentGameMode === 'practice') generatePracticeQuestion();
            if (currentGameMode === 'meaning') generateMeaningQuestion();
        }

        function switchMode(mode) {
            currentGameMode = mode;
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            
            // Ẩn toàn bộ các section
            document.getElementById('flashcard-section').style.display = 'none';
            document.getElementById('practice-section').style.display = 'none';
            document.getElementById('meaning-section').style.display = 'none';

            if (mode === 'flashcard') {
                document.getElementById('btn-flashcard').classList.add('active');
                document.getElementById('flashcard-section').style.display = 'block';
                updateFlashcard();
            } else if (mode === 'practice') {
                document.getElementById('btn-practice').classList.add('active');
                document.getElementById('practice-section').style.display = 'block';
                generatePracticeQuestion();
            } else if (mode === 'meaning') {
                document.getElementById('btn-meaning').classList.add('active');
                document.getElementById('meaning-section').style.display = 'block';
                generateMeaningQuestion();
            }
        }

        function updateFlashcard() {
            if (activeWordsList.length === 0) return;
            const currentItem = activeWordsList[currentIndex];
            document.getElementById('front-word').innerText = currentItem.word;
            document.getElementById('front-ipa').innerText = currentItem.ipa;
            document.getElementById('back-meaning').innerText = currentItem.meaning;
            document.getElementById('back-example').innerText = currentItem.example;
        }

        function toggleCard() { document.getElementById('card').classList.toggle('flipped'); }
        function nextCard() {
            document.getElementById('card').classList.remove('flipped');
            setTimeout(() => { currentIndex = (currentIndex + 1) % activeWordsList.length; updateFlashcard(); }, 200);
        }
        function prevCard() {
            document.getElementById('card').classList.remove('flipped');
            setTimeout(() => { currentIndex = (currentIndex - 1 + activeWordsList.length) % activeWordsList.length; updateFlashcard(); }, 200);
        }

        // 2. Hàm sinh câu hỏi phần LUYỆN PHÁT ÂM
        function generatePracticeQuestion() {
            isAnswered = false;
            if (activeWordsList.length === 0) return;

            const randomIndex = Math.floor(Math.random() * activeWordsList.length);
            currentWordItem = activeWordsList[randomIndex];

            document.getElementById('practice-ipa').innerText = currentWordItem.ipa;
            document.getElementById('practice-hint').innerText = `(Nghĩa: ${currentWordItem.meaning})`;
            
            const inputField = document.getElementById('answerInput');
            inputField.value = '';
            inputField.disabled = false;
            inputField.focus();
            document.getElementById('resultDisplay').innerHTML = '';
        }

        // 3. Hàm sinh câu hỏi phần ĐOÁN NGHĨA TIẾNG VIỆT
        function generateMeaningQuestion() {
            isAnswered = false;
            if (activeWordsList.length === 0) return;

            const randomIndex = Math.floor(Math.random() * activeWordsList.length);
            currentWordItem = activeWordsList[randomIndex];

            document.getElementById('meaning-vietnamese').innerText = currentWordItem.meaning;
            
            const inputField = document.getElementById('meaningInput');
            inputField.value = '';
            inputField.disabled = false;
            inputField.focus();
            document.getElementById('meaningResultDisplay').innerHTML = '';
        }

        // Tạo câu ví dụ thứ 2 bổ trợ tự động dựa trên từ vựng
        function generateSecondExample(word) {
            return `Please look up the definition of "${word}" if you do not understand it.`;
        }

        // Hàm xử lý kiểm tra kết quả chung cho cả 2 chế độ tự luận
        function checkAnswer(mode) {
            if (isAnswered || !currentWordItem) return;
            
            const inputId = mode === 'practice' ? 'answerInput' : 'meaningInput';
            const displayId = mode === 'practice' ? 'resultDisplay' : 'meaningResultDisplay';
            
            const inputField = document.getElementById(inputId);
            const resultDisplay = document.getElementById(displayId);
            
            const userInput = inputField.value.trim().toLowerCase();
            const correctAnswer = currentWordItem.word.trim().toLowerCase();

            if (userInput === "") {
                resultDisplay.innerHTML = '<span style="color: #e67e22;">Vui lòng nhập đáp án trước!</span>';
                return;
            }

            isAnswered = true;
            inputField.disabled = true;
            scoreTotal++;
            document.getElementById('total-count').innerText = scoreTotal;

            // Xây dựng khối hiển thị 2 ví dụ
            const exampleHTML = `
                <div class="example-box">
                    <p><strong>Ví dụ 1:</strong> ${currentWordItem.example}</p>
                    <p><strong>Ví dụ 2:</strong> ${generateSecondExample(currentWordItem.word)}</p>
                </div>
            `;

            if (userInput === correctAnswer) {
                resultDisplay.innerHTML = `<span style="color: var(--secondary);">🎉 Đúng rồi! Xuất sắc!</span>` + exampleHTML;
                scoreCorrect++;
                document.getElementById('correct-count').innerText = scoreCorrect;
            } else {
                resultDisplay.innerHTML = `<span style="color: var(--danger);">❌ Chưa chính xác! Đáp án là: <strong style="font-size: 1.4rem;">${currentWordItem.word}</strong></span>` + exampleHTML;
            }

            // Kéo dài thời gian chuyển câu lên 3 giây để học sinh kịp đọc câu ví dụ
            setTimeout(() => {
                if (mode === 'practice') generatePracticeQuestion();
                if (mode === 'meaning') generateMeaningQuestion();
            }, 3000);
        }
